name: "&fCod"
group: fishing
hide-before-tier-1: false
hide-when-locked: false

description:
  - "&7Catch cod to progress."
  - "&7Tier: &e%tier_numeral%&7/&e%max_tier_numeral%"
  - "&7Progress: &e%count%&7/&e%required% &8(&e%percent%%&8)"

gui:
  icon: cod
  position:
    row: 2
    column: 1
  lore:
    - "%description%"
    - ""
    - "&8Click to view tiers"

tier-requirements:
  - 50
  - 100
  - 250
  - 500
  - 1000
  - 2500
  - 5000
  - 10000
  - 25000
  - 50000

count-methods:
  - trigger: catch_fish
    filters:
      items:
        - cod

unlock-conditions: []
conditions: []

tier-up-effects:
  - tier: all
    effects:
      - id: send_message
        args:
          message: "&6&fCod &e%raw_fish_numeral% &freached!"

completion-effects:
  - id: broadcast
    args:
      message: "&6%player% &fhas maxed the &e&fCod &fcollection!"

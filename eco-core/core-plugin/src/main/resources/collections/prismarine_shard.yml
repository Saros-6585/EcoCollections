    effects:
      - id: send_message
        args:
          message: "&6&3Prismarine Shard &e%prismarine_shard_numeral% &freached!"

completion-rewards:
  - id: broadcast
    args:
      message: "&6%player% &fhas maxed the &e&3Prismarine Shard &fcollection!"

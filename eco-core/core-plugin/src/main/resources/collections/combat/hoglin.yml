name: "&4Hoglin"
group: combat
hide-before-tier-1: false
hide-when-locked: false

description:
  - "&7Kill hoglins to progress."
  - "&7Tier: &e%tier_numeral%&7/&e%max_tier_numeral%"
  - "&7Progress: &e%count%&7/&e%required% &8(&e%percent%%&8)"

gui:
  icon: leather
  position:
    row: 3
    column: 1
  lore:
    - "%description%"
    - ""
    - "&8Click to view tiers"

tier-requirements:
  - 25
  - 50
  - 125
  - 250
  - 500
  - 1250
  - 2500
  - 5000
  - 12500
  - 25000

count-methods:
  - trigger: kill
    filters:
      entities:
        - hoglin
      from_spawner: false

unlock-conditions: []
conditions: []

tier-up-effects:
  - tier: all
    effects:
      - id: send_message
        args:
          message: "&6&4Hoglin &e%hoglin_numeral% &freached!"

completion-effects:
  - id: broadcast
    args:
      message: "&6%player% &fhas maxed the &e&4Hoglin &fcollection!"

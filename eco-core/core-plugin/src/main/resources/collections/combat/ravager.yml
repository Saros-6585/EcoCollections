name: "&7Ravager"
group: combat
hide-before-tier-1: false
hide-when-locked: false

description:
  - "&7Kill ravagers to progress."
  - "&7Tier: &e%tier_numeral%&7/&e%max_tier_numeral%"
  - "&7Progress: &e%count%&7/&e%required% &8(&e%percent%%&8)"

gui:
  icon: saddle
  position:
    row: 4
    column: 1
  lore:
    - "%description%"
    - ""
    - "&8Click to view tiers"

tier-requirements:
  - 10
  - 25
  - 50
  - 100
  - 250
  - 500
  - 1000
  - 2500
  - 5000
  - 10000

count-methods:
  - trigger: kill
    value: 1
    filters:
      entities:
        - ravager
      from_spawner: false

unlock-conditions: []
conditions: []

tier-up-effects:
  - tier: all
    effects:
      - id: send_message
        args:
          message: "&6&7Ravager &e%tier_numeral% &freached!"

completion-effects:
  - id: broadcast
    args:
      message: "&6%player% &fhas maxed the &e&7Ravager &fcollection!"

name: "&7Skeleton"
group: combat
hide-before-tier-1: false
hide-when-locked: false

description:
  - "&7Kill skeletons to progress."
  - "&7Tier: &e%tier_numeral%&7/&e%max_tier_numeral%"
  - "&7Progress: &e%count%&7/&e%required% &8(&e%percent%%&8)"

gui:
  icon: bone
  position:
    row: 2
    column: 2
  lore:
    - "%description%"
    - ""
    - "&8Click to view tiers"

tier-requirements:
  - 50
  - 100
  - 250
  - 500
  - 1000
  - 2500
  - 5000
  - 10000
  - 25000
  - 50000

count-methods:
  - trigger: kill
    filters:
      entities:
        - skeleton
      from_spawner: false

unlock-conditions: []
conditions: []

tier-rewards:
  - tier: all
    effects:
      - id: send_message
        args:
          message: "&6&7Skeleton &e%skeleton_numeral% &freached!"

completion-rewards:
  - id: broadcast
    args:
      message: "&6%player% &fhas maxed the &e&7Skeleton &fcollection!"

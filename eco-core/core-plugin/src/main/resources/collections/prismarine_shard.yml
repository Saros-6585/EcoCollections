  - "&7Tier: &e%tier_numeral%&7/&e%max_tier_numeral%"
  - "&7Progress: &e%count%&7/&e%required% &8(&e%percent%%&8)"

gui:
  icon: prismarine_shard
  position:
    row: 2
    column: 5
  lore:
    - "%description%"
    - ""
    - "&8Click to view tiers"

tier-requirements:
  - 10
  - 25
  - 50
  - 100
  - 250
  - 500
  - 1000
  - 2500
  - 5000
  - 10000

count-methods:
  - trigger: catch_fish
    filters:
      items:
        - prismarine_shard

unlock-conditions: []
conditions: []

tier-rewards:

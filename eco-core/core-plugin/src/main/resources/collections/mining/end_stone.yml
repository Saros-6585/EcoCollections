name: "&eEnd Stone"
group: mining
hide-before-tier-1: false
hide-when-locked: false

description:
  - "&7Mine end stone to progress."
  - "&7Tier: &e%tier_numeral%&7/&e%max_tier_numeral%"
  - "&7Progress: &e%count%&7/&e%required% &8(&e%percent%%&8)"

gui:
  icon: end_stone
  position:
    row: 4
    column: 1
  lore:
    - "%description%"
    - ""
    - "&8Click to view tiers"

tier-requirements:
  - 25
  - 50
  - 125
  - 250
  - 500
  - 1250
  - 2500
  - 5000
  - 12500
  - 25000

count-methods:
  - trigger: mine_block
    filters:
      player_placed: false
      blocks:
        - end_stone

unlock-conditions: []
conditions: []

tier-rewards:
  - tier: all
    effects:
      - id: send_message
        args:
          message: "&6&eEnd Stone &e%end_stone_numeral% &freached!"

completion-rewards:
  - id: broadcast
    args:
      message: "&6%player% &fhas maxed the &e&eEnd Stone &fcollection!"

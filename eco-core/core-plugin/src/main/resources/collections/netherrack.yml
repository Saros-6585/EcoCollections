name: "&4Netherrack"
group: mining
hide-before-tier-1: false
hide-when-locked: false

description:
  - "&7Mine netherrack to progress."
  - "&7Tier: &e%tier_numeral%&7/&e%max_tier_numeral%"
  - "&7Progress: &e%count%&7/&e%required% &8(&e%percent%%&8)"

gui:
  icon: netherrack
  position:
    row: 3
    column: 1
  lore:
    - "%description%"
    - ""
    - "&8Click to view tiers"

tier-requirements:
  - 50
  - 100
  - 250
  - 500
  - 1000
  - 2500
  - 5000
  - 10000
  - 25000
  - 50000

count-methods:
  - trigger: mine_block
    filters:
      player_placed: false
      blocks:
        - netherrack

unlock-conditions: []
conditions: []

tier-rewards:
  - tier: all
    effects:
      - id: send_message
        args:
          message: "&6&4Netherrack &e%netherrack_numeral% &freached!"

completion-rewards:
  - id: broadcast
    args:
      message: "&6%player% &fhas maxed the &e&4Netherrack &fcollection!"

name: "&4Ancient Debris"
group: mining
hide-before-tier-1: false
hide-when-locked: false

description:
  - "&7Mine ancient debris to progress."
  - "&7Tier: &e%tier_numeral%&7/&e%max_tier_numeral%"
  - "&7Progress: &e%count%&7/&e%required% &8(&e%percent%%&8)"

gui:
  icon: ancient_debris
  position:
    row: 3
    column: 4
  lore:
    - "%description%"
    - ""
    - "&8Click to view tiers"

tier-requirements:
  - 1
  - 2
  - 5
  - 10
  - 25
  - 50
  - 100
  - 250
  - 500
  - 1000

count-methods:
  - trigger: mine_block
    filters:
      player_placed: false
      blocks:
        - ancient_debris

unlock-conditions: []
conditions: []

tier-rewards:
  - tier: all
    effects:
      - id: send_message
        args:
          message: "&6&4Ancient Debris &e%ancient_debris_numeral% &freached!"

completion-rewards:
  - id: broadcast
    args:
      message: "&6%player% &fhas maxed the &e&4Ancient Debris &fcollection!"

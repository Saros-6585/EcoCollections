name: "&cSweet Berries"
group: farming
hide-before-tier-1: false
hide-when-locked: false

description:
  - "&7Harvest sweet berries to progress."
  - "&7Tier: &e%tier_numeral%&7/&e%max_tier_numeral%"
  - "&7Progress: &e%count%&7/&e%required% &8(&e%percent%%&8)"

gui:
  icon: sweet_berries
  position:
    row: 3
    column: 2
  lore:
    - "%description%"
    - ""
    - "&8Click to view tiers"

tier-requirements:
  - 25
  - 50
  - 125
  - 250
  - 500
  - 1250
  - 2500
  - 5000
  - 12500
  - 25000

count-methods:
  - trigger: mine_block
    filters:
      player_placed: false
      fully_grown: true
      blocks:
        - sweet_berry_bush

unlock-conditions: []
conditions: []

tier-up-effects:
  - tier: all
    effects:
      - id: send_message
        args:
          message: "&6&cSweet Berries &e%sweet_berries_numeral% &freached!"

completion-effects:
  - id: broadcast
    args:
      message: "&6%player% &fhas maxed the &e&cSweet Berries &fcollection!"

name: "&aEmerald"
group: mining
hide-before-tier-1: false
hide-when-locked: false

description:
  - "&7Mine emerald ore to progress."
  - "&7Tier: &e%tier_numeral%&7/&e%max_tier_numeral%"
  - "&7Progress: &e%count%&7/&e%required% &8(&e%percent%%&8)"

gui:
  icon: emerald
  position:
    row: 2
    column: 8
  lore:
    - "%description%"
    - ""
    - "&8Click to view tiers"

tier-requirements:
  - 10
  - 25
  - 50
  - 100
  - 250
  - 500
  - 1000
  - 2500
  - 5000
  - 10000

count-methods:
  - trigger: mine_block
    filters:
      player_placed: false
      blocks:
        - emerald_ore
        - deepslate_emerald_ore

unlock-conditions: []
conditions: []

tier-rewards:
  - tier: all
    effects:
      - id: send_message
        args:
          message: "&6&aEmerald &e%emerald_numeral% &freached!"

completion-rewards:
  - id: broadcast
    args:
      message: "&6%player% &fhas maxed the &e&aEmerald &fcollection!"
